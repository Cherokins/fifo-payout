<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE98 • FIFO Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f4f6fa;color:#0a0c12;padding:1rem;}
        .container{max-width:720px;margin:0 auto;}
        .card{background:#fff;border-radius:2rem;padding:1.8rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.02);}
        .balance-hero{background:linear-gradient(145deg,#0b1120,#1a2538);color:#fff;border-radius:2rem;padding:2rem;margin-bottom:1rem;}
        .balance-label{font-size:0.85rem;opacity:0.7;letter-spacing:0.3px;}
        .balance-number{font-size:3.8rem;font-weight:800;line-height:1;margin:0.75rem 0;}
        .chip{background:rgba(255,255,255,0.12);display:inline-block;padding:0.3rem 1rem;border-radius:2rem;font-size:0.75rem;}
        .flex-row{display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;margin:1.25rem 0;}
        input{flex:2;padding:0.9rem 1rem;border:1px solid #e2e8f0;border-radius:1.2rem;font-size:1rem;font-family:inherit;background:#fff;}
        input:focus{outline:none;border-color:#3b4b6e;}
        button{background:#0f1724;color:#fff;border:none;padding:0.9rem 1.8rem;border-radius:1.2rem;font-weight:600;cursor:pointer;transition:0.15s;font-size:0.95rem;}
        button:hover{background:#1e2a3a;transform:translateY(-1px);}
        .info-panel{background:#f0f3f9;border-radius:1.2rem;padding:1rem 1.2rem;margin:1rem 0;}
        .tx-item{display:flex;justify-content:space-between;align-items:center;padding:0.8rem 0;border-bottom:1px solid #e9edf2;}
        .tx-positive{color:#0f7b3a;font-weight:600;}
        .hidden{display:none;}
        .auth-card{text-align:center;padding:2.5rem;}
        .google-btn{background:#0f1724;width:100%;max-width:280px;margin:1.5rem auto 0;display:block;}
        .small-text{font-size:0.75rem;color:#5b6e8c;margin-top:0.5rem;}
        footer{text-align:center;padding:2rem 0 0.5rem;color:#7d8eaa;font-size:0.7rem;}
        @media (max-width:540px){.balance-number{font-size:2.6rem;}}
    </style>
</head>
<body>
<div class="container">
    <div id="authView" class="card auth-card">
        <div style="font-size:2.5rem;font-weight:800;margin-bottom:0.5rem;">CODE98</div>
        <div style="color:#5b6e8c;margin-bottom:1.8rem;">FIFO • sequential payout engine</div>
        <button class="google-btn" id="googleSignBtn">→ Sign in with Google</button>
        <div id="authMsg" class="small-text" style="margin-top:1rem;"></div>
    </div>

    <div id="dashView" class="hidden">
        <div class="balance-hero">
            <div class="balance-label">available balance</div>
            <div class="balance-number" id="balanceDisplay">0 <span style="font-size:1.2rem;">KES</span></div>
            <div class="chip" id="queueChip">position —</div>
        </div>

        <div class="card">
            <div style="font-weight:700;margin-bottom:0.25rem;">+40% yield</div>
            <div style="font-size:0.8rem;color:#5b6e8c;margin-bottom:1rem;">deposit → balance increases by 1.4×</div>
            <div class="flex-row">
                <input type="number" id="investAmount" placeholder="amount KES" min="10">
                <button id="investAction">invest</button>
            </div>
            <div class="small-text">ex: 500 KES adds +700 to balance</div>
        </div>

        <div class="card">
            <div id="queueStatus" class="info-panel">— queue status —</div>
        </div>

        <div class="card">
            <div style="font-weight:600;margin-bottom:1rem;">ledger</div>
            <div id="txContainer" style="max-height:320px;overflow-y:auto;"></div>
        </div>
        <footer>strict FIFO • withdrawal triggers at ≥1,000 KES</footer>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, query, where, getDocs, orderBy, writeBatch, limit } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCO4bCT2Si5F88LIYT-VStxTh8dbQJVqKM",
        authDomain: "fifo-payout-engine.firebaseapp.com",
        projectId: "fifo-payout-engine",
        storageBucket: "fifo-payout-engine.firebasestorage.app",
        messagingSenderId: "887817353062",
        appId: "1:887817353062:web:efe94e1b7c561183f53aa7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUid = null;

    const authView = document.getElementById('authView');
    const dashView = document.getElementById('dashView');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const queueChip = document.getElementById('queueChip');
    const queueStatus = document.getElementById('queueStatus');
    const txContainer = document.getElementById('txContainer');
    const investBtn = document.getElementById('investAction');
    const amountInput = document.getElementById('investAmount');

    async function recalcQueueAndWithdraw() {
        if (!currentUid) return;
        
        // Get all users with balance >= 1000, ordered by the time they first crossed threshold
        const snapshot = await getDocs(collection(db, 'users'));
        const eligible = [];
        for (const docSnap of snapshot.docs) {
            const data = docSnap.data();
            if (data.balance >= 1000) {
                eligible.push({ id: docSnap.id, balance: data.balance, reachedAt: data.reached1000At || '9999-12-31' });
            }
        }
        eligible.sort((a,b) => (a.reachedAt || '').localeCompare(b.reachedAt || ''));
        
        let processed = true;
        while (processed && eligible.length > 0) {
            const first = eligible[0];
            if (first.balance >= 1000) {
                const userRef = doc(db, 'users', first.id);
                const userSnap = await getDoc(userRef);
                const currentBal = userSnap.data()?.balance || 0;
                if (currentBal >= 1000) {
                    const newBal = currentBal - 1000;
                    await updateDoc(userRef, { balance: newBal });
                    await addDoc(collection(db, 'withdrawals'), {
                        userId: first.id,
                        amount: 1000,
                        status: 'processed',
                        createdAt: new Date().toISOString()
                    });
                    first.balance = newBal;
                    if (newBal < 1000) {
                        eligible.shift();
                    }
                    continue;
                }
            }
            processed = false;
        }
    }

    async function loadDashboard() {
        if (!currentUid) return;
        const userRef = doc(db, 'users', currentUid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) return;
        const data = userSnap.data();
        const balance = data.balance || 0;
        balanceDisplay.innerText = balance.toLocaleString() + ' KES';
        
        // compute queue position without composite index
        const allUsers = await getDocs(collection(db, 'users'));
        const qualified = [];
        for (const docSnap of allUsers.docs) {
            const d = docSnap.data();
            if (d.balance >= 1000) {
                qualified.push({ id: docSnap.id, ts: d.reached1000At || '9999-12-31' });
            }
        }
        qualified.sort((a,b) => a.ts.localeCompare(b.ts));
        const pos = qualified.findIndex(q => q.id === currentUid) + 1;
        queueChip.innerText = pos ? `queue #${pos}` : 'position —';
        
        if (balance >= 1000) {
            queueStatus.innerHTML = `✅ in queue · position ${pos || 'pending'} · next withdrawal processes automatically`;
        } else {
            queueStatus.innerHTML = `📌 need ${(1000 - balance).toLocaleString()} KES more to enter FIFO queue`;
        }
        
        const txQuery = await getDocs(query(collection(db, 'investments'), where('userId', '==', currentUid), orderBy('timestamp', 'desc'), limit(20)));
        if (txQuery.empty) {
            txContainer.innerHTML = '<div class="tx-item">— no deposits —</div>';
        } else {
            let html = '';
            txQuery.forEach(doc => {
                const t = doc.data();
                html += `<div class="tx-item"><span>+${t.totalAdded} KES</span><span class="tx-positive">→ ${t.amount} KES paid</span><span style="font-size:0.7rem;">${new Date(t.timestamp).toLocaleDateString()}</span></div>`;
            });
            txContainer.innerHTML = html;
        }
    }

    async function handleInvestment(amount) {
        if (amount < 10) throw new Error('minimum 10 KES');
        const profit = amount * 0.4;
        const totalAdd = amount + profit;
        const userRef = doc(db, 'users', currentUid);
        const userSnap = await getDoc(userRef);
        const oldBalance = userSnap.data()?.balance || 0;
        const newBalance = oldBalance + totalAdd;
        const wasBelow = oldBalance < 1000;
        const nowAbove = newBalance >= 1000;
        
        const batch = writeBatch(db);
        batch.update(userRef, { balance: newBalance });
        if (wasBelow && nowAbove && !userSnap.data()?.reached1000At) {
            batch.update(userRef, { reached1000At: new Date().toISOString() });
        }
        const txRef = doc(collection(db, 'investments'));
        batch.set(txRef, {
            userId: currentUid,
            amount: amount,
            profit: profit,
            totalAdded: totalAdd,
            timestamp: new Date().toISOString()
        });
        await batch.commit();
        await recalcQueueAndWithdraw();
        await loadDashboard();
    }

    investBtn.onclick = async () => {
        const amt = parseFloat(amountInput.value);
        if (!amt || amt < 10) {
            alert('enter amount (min 10 KES)');
            return;
        }
        investBtn.disabled = true;
        investBtn.innerText = 'processing...';
        try {
            await handleInvestment(amt);
            amountInput.value = '';
            alert(`invested ${amt} KES → +${profit} KES added`);
        } catch (err) {
            alert('error: ' + err.message);
        } finally {
            investBtn.disabled = false;
            investBtn.innerText = 'invest';
        }
    };

    document.getElementById('googleSignBtn').onclick = async () => {
        try {
            const res = await signInWithPopup(auth, provider);
            const uid = res.user.uid;
            const userRef = doc(db, 'users', uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, {
                    email: res.user.email,
                    balance: 0,
                    createdAt: new Date().toISOString(),
                    name: res.user.displayName || ''
                });
            }
        } catch (err) {
            document.getElementById('authMsg').innerText = err.message;
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUid = user.uid;
            authView.classList.add('hidden');
            dashView.classList.remove('hidden');
            await loadDashboard();
        } else {
            currentUid = null;
            authView.classList.remove('hidden');
            dashView.classList.add('hidden');
        }
    });
</script>
</body>
</html>
