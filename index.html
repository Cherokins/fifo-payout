<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CODE98 • FIFO Payout Engine</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Paystack -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a12;
      color: #ededf5;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
    }

    /* Auth Screen */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%), #0a0a12;
    }

    .auth-card {
      background: #12121f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 48px 36px;
      width: 380px;
      text-align: center;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #c9a84c, #debb6e);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: #000;
      margin: 0 auto 16px;
    }

    .brand-name {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      letter-spacing: -0.5px;
    }

    .auth-tag {
      font-size: 13px;
      color: #8888aa;
      margin: 12px 0 28px;
    }

    .btn-google {
      width: 100%;
      padding: 14px 20px;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 60px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s;
    }

    .btn-google:hover {
      background: #22223b;
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    /* App Screen */
    #app-screen {
      display: none;
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #c9a84c, #debb6e);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #000;
    }

    .logo-text {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,168,76,0.4);
    }

    .signout-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: #8888aa;
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .signout-btn:hover {
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }

    /* Balance Card */
    .balance-card {
      background: linear-gradient(135deg, #12121f, #0e0e18);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 20px;
    }

    .balance-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8888aa;
    }

    .balance-amount {
      font-family: 'Instrument Serif', serif;
      font-size: 56px;
      color: #debb6e;
      margin: 12px 0;
    }

    .queue-status {
      font-size: 13px;
      color: #8888aa;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #12121f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666680;
    }

    .stat-value {
      font-family: 'Fira Code', monospace;
      font-size: 22px;
      font-weight: 600;
      margin-top: 6px;
    }

    .stat-value.gold { color: #c9a84c; }
    .stat-value.green { color: #2ecc9a; }

    /* Tier Grid */
    .tier-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .tier-card {
      background: #12121f;
      border: 1.5px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tier-card:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-2px);
    }

    .tier-card.selected {
      border-color: #c9a84c;
      background: rgba(201,168,76,0.08);
    }

    .tier-amount {
      font-family: 'Instrument Serif', serif;
      font-size: 24px;
      font-weight: 600;
    }

    .tier-get {
      font-size: 11px;
      color: #2ecc9a;
      margin-top: 4px;
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #c9a84c, #debb6e);
      color: #000;
      border: none;
      padding: 14px 24px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 12px 20px;
      border-radius: 60px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
    }

    /* Transaction List */
    .tx-list {
      background: #12121f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 16px;
      margin-top: 20px;
    }

    .tx-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .tx-item:last-child {
      border-bottom: none;
    }

    .tx-type {
      font-size: 13px;
      font-weight: 500;
    }

    .tx-type.invest { color: #2ecc9a; }
    .tx-type.credit { color: #c9a84c; }
    .tx-type.withdraw { color: #ff6b6b; }

    .tx-amount {
      font-family: 'Fira Code', monospace;
      font-size: 14px;
    }

    .tx-date {
      font-size: 10px;
      color: #666680;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal {
      background: #12121f;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 32px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .modal h3 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .modal-amount {
      font-size: 36px;
      color: #c9a84c;
      margin: 16px 0;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 60px;
      padding: 12px 24px;
      font-size: 13px;
      z-index: 1100;
      transition: all 0.3s;
    }

    .hidden {
      display: none !important;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #666680;
    }

    @media (max-width: 500px) {
      #app-screen { padding: 12px; }
      .balance-amount { font-size: 42px; }
      .tier-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="brand-icon">98</div>
    <div class="brand-name">CODE98</div>
    <div class="auth-tag">FIFO • Sequential Payout Engine</div>
    <button class="btn-google" id="google-signin-btn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>
</div>

<div id="app-screen">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">98</div>
      <div class="logo-text">CODE98</div>
    </div>
    <div class="user-info">
      <span id="user-name"></span>
      <img class="user-avatar" id="user-avatar" src="">
      <button class="signout-btn" id="signout-btn">Exit</button>
    </div>
  </div>

  <div class="balance-card">
    <div class="balance-label">Wallet Balance</div>
    <div class="balance-amount" id="balance">KES 0</div>
    <div class="queue-status" id="queue-status">—</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Invested</div>
      <div class="stat-value gold" id="total-invested">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Credits Earned</div>
      <div class="stat-value green" id="total-credits">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Queue Position</div>
      <div class="stat-value" id="queue-pos">—</div>
    </div>
  </div>

  <div class="tier-grid" id="tier-grid"></div>

  <button class="btn-primary" id="invest-btn" disabled>Select an amount</button>

  <div class="tx-list">
    <div style="margin-bottom: 12px; font-size: 13px; font-weight: 600;">Transaction History</div>
    <div id="tx-list"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="payment-modal">
  <div class="modal">
    <h3>Confirm Investment</h3>
    <div>You pay</div>
    <div class="modal-amount" id="modal-pay">KES 0</div>
    <div>You receive credit</div>
    <div class="modal-amount" id="modal-get" style="font-size: 28px;">KES 0</div>
    <button class="btn-primary" id="confirm-pay-btn" style="margin-top: 20px;">Confirm Payment</button>
    <button class="btn-outline" id="cancel-modal-btn" style="margin-top: 10px;">Cancel</button>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCO4bCT2Si5F88LIYT-VStxTh8dbQJVqKM",
    authDomain: "fifo-payout-engine.firebaseapp.com",
    projectId: "fifo-payout-engine",
    storageBucket: "fifo-payout-engine.firebasestorage.app",
    messagingSenderId: "887817353062",
    appId: "1:887817353062:web:efe94e1b7c561183f53aa7"
  };

  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const TIERS = [50, 100, 200, 500, 1000, 2500, 3500, 5000, 6000, 12000, 20000, 25000];
  const PROFIT_RATE = 0.4;

  let currentUser = null;
  let selectedTier = null;
  let unsubscribeFns = [];

  // DOM Elements
  const authScreen = document.getElementById('auth-screen');
  const appScreen = document.getElementById('app-screen');
  const googleBtn = document.getElementById('google-signin-btn');
  const signoutBtn = document.getElementById('signout-btn');
  const tierGrid = document.getElementById('tier-grid');
  const investBtn = document.getElementById('invest-btn');
  const balanceEl = document.getElementById('balance');
  const queueStatusEl = document.getElementById('queue-status');
  const totalInvestedEl = document.getElementById('total-invested');
  const totalCreditsEl = document.getElementById('total-credits');
  const queuePosEl = document.getElementById('queue-pos');
  const txListEl = document.getElementById('tx-list');
  const modal = document.getElementById('payment-modal');
  const modalPay = document.getElementById('modal-pay');
  const modalGet = document.getElementById('modal-get');
  const confirmPayBtn = document.getElementById('confirm-pay-btn');
  const cancelModalBtn = document.getElementById('cancel-modal-btn');
  const toastEl = document.getElementById('toast');
  const userNameSpan = document.getElementById('user-name');
  const userAvatarImg = document.getElementById('user-avatar');

  function showToast(msg, isError = false) {
    toastEl.textContent = msg;
    toastEl.style.background = isError ? '#2a1215' : '#1a2a1a';
    toastEl.style.borderColor = isError ? '#ff4d6a' : '#2ecc9a';
    toastEl.classList.remove('hidden');
    setTimeout(() => toastEl.classList.add('hidden'), 3000);
  }

  // Render tier grid
  function renderTiers() {
    tierGrid.innerHTML = TIERS.map(amt => `
      <div class="tier-card" data-tier="${amt}">
        <div class="tier-amount">KES ${amt.toLocaleString()}</div>
        <div class="tier-get">+${(amt * PROFIT_RATE).toLocaleString()} credit</div>
      </div>
    `).join('');

    document.querySelectorAll('.tier-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedTier = parseInt(card.dataset.tier);
        investBtn.disabled = false;
        investBtn.textContent = `Invest KES ${selectedTier.toLocaleString()}`;
      });
    });
  }

  // FIFO payout processor
  async function processFIFOPayouts() {
    const usersRef = db.collection('users');
    const usersSnap = await usersRef.get();
    
    const eligibleUsers = [];
    for (const doc of usersSnap.docs) {
      const data = doc.data();
      if (data.walletBalance >= 1000) {
        eligibleUsers.push({
          id: doc.id,
          balance: data.walletBalance,
          reachedAt: data.reached1000At || '9999'
        });
      }
    }
    
    eligibleUsers.sort((a, b) => (a.reachedAt || '').localeCompare(b.reachedAt || ''));
    
    for (const user of eligibleUsers) {
      if (user.balance >= 1000) {
        const userRef = db.collection('users').doc(user.id);
        const newBalance = user.balance - 1000;
        
        await userRef.update({ walletBalance: newBalance });
        
        await db.collection('transactions').add({
          uid: user.id,
          type: 'withdraw',
          amount: 1000,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        if (newBalance < 1000 && user.reachedAt !== '9999') {
          await userRef.update({ reached1000At: firebase.firestore.FieldValue.delete() });
        }
      }
    }
  }

  // Process investment
  async function processInvestment(amount) {
    const profit = amount * PROFIT_RATE;
    const totalAdd = amount + profit;
    
    const userRef = db.collection('users').doc(currentUser.uid);
    const userSnap = await userRef.get();
    const oldBalance = userSnap.data()?.walletBalance || 0;
    const newBalance = oldBalance + totalAdd;
    const wasBelow = oldBalance < 1000;
    const nowAbove = newBalance >= 1000;
    
    const batch = db.batch();
    
    batch.update(userRef, { 
      walletBalance: newBalance,
      totalInvested: firebase.firestore.FieldValue.increment(amount),
      totalCredits: firebase.firestore.FieldValue.increment(profit)
    });
    
    if (wasBelow && nowAbove) {
      batch.update(userRef, { reached1000At: new Date().toISOString() });
    }
    
    batch.set(db.collection('transactions').doc(), {
      uid: currentUser.uid,
      type: 'invest',
      amount: amount,
      profit: profit,
      totalAdded: totalAdd,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    await batch.commit();
    await processFIFOPayouts();
    showToast(`Invested KES ${amount.toLocaleString()}! +KES ${profit.toLocaleString()} credit added.`);
  }

  // Open payment modal
  function openPaymentModal(amount) {
    modalPay.textContent = `KES ${amount.toLocaleString()}`;
    modalGet.textContent = `KES ${(amount * PROFIT_RATE).toLocaleString()}`;
    modal.classList.remove('hidden');
  }

  // Load user dashboard
  async function loadDashboard() {
    if (!currentUser) return;
    
    const userRef = db.collection('users').doc(currentUser.uid);
    const userSnap = await userRef.get();
    const data = userSnap.data() || { walletBalance: 0, totalInvested: 0, totalCredits: 0 };
    
    balanceEl.textContent = `KES ${(data.walletBalance || 0).toLocaleString()}`;
    totalInvestedEl.textContent = (data.totalInvested || 0).toLocaleString();
    totalCreditsEl.textContent = (data.totalCredits || 0).toLocaleString();
    
    // Calculate queue position
    const allUsers = await db.collection('users').get();
    const qualified = [];
    for (const doc of allUsers.docs) {
      const d = doc.data();
      if (d.walletBalance >= 1000 && d.reached1000At) {
        qualified.push({ id: doc.id, ts: d.reached1000At });
      }
    }
    qualified.sort((a, b) => (a.ts || '').localeCompare(b.ts || ''));
    const pos = qualified.findIndex(q => q.id === currentUser.uid) + 1;
    
    if (pos > 0) {
      queuePosEl.textContent = `#${pos}`;
      queueStatusEl.textContent = `In queue · Position ${pos} · Next payout at head`;
    } else if ((data.walletBalance || 0) >= 1000) {
      queuePosEl.textContent = 'pending';
      queueStatusEl.textContent = 'Reached 1000 KES · Entering queue shortly';
    } else {
      const need = 1000 - (data.walletBalance || 0);
      queuePosEl.textContent = '—';
      queueStatusEl.textContent = `Need KES ${need.toLocaleString()} more to enter queue`;
    }
    
    // Load transactions
    const txSnap = await db.collection('transactions')
      .where('uid', '==', currentUser.uid)
      .orderBy('timestamp', 'desc')
      .limit(20)
      .get();
    
    if (txSnap.empty) {
      txListEl.innerHTML = '<div class="empty">No transactions yet</div>';
    } else {
      txListEl.innerHTML = txSnap.docs.map(doc => {
        const t = doc.data();
        let typeClass = '';
        let typeText = '';
        let sign = '';
        let amount = 0;
        
        if (t.type === 'invest') {
          typeClass = 'invest';
          typeText = 'Investment';
          sign = '+';
          amount = t.totalAdded;
        } else if (t.type === 'withdraw') {
          typeClass = 'withdraw';
          typeText = 'Withdrawal';
          sign = '-';
          amount = t.amount;
        } else {
          typeClass = 'credit';
          typeText = 'Credit';
          sign = '+';
          amount = t.amount;
        }
        
        const date = t.timestamp?.toDate?.() || new Date();
        return `
          <div class="tx-item">
            <div>
              <div class="tx-type ${typeClass}">${typeText}</div>
              <div class="tx-date">${date.toLocaleDateString()}</div>
            </div>
            <div class="tx-amount">${sign} KES ${amount.toLocaleString()}</div>
          </div>
        `;
      }).join('');
    }
  }

  // Auth state
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user;
      authScreen.style.display = 'none';
      appScreen.style.display = 'block';
      
      userNameSpan.textContent = user.displayName?.split(' ')[0] || '';
      userAvatarImg.src = user.photoURL || '';
      
      const userRef = db.collection('users').doc(user.uid);
      const snap = await userRef.get();
      if (!snap.exists()) {
        await userRef.set({
          email: user.email,
          displayName: user.displayName,
          photoURL: user.photoURL,
          walletBalance: 0,
          totalInvested: 0,
          totalCredits: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      
      renderTiers();
      await loadDashboard();
      
      unsubscribeFns.push(
        db.collection('users').doc(user.uid).onSnapshot(() => loadDashboard())
      );
    } else {
      currentUser = null;
      authScreen.style.display = 'flex';
      appScreen.style.display = 'none';
      unsubscribeFns.forEach(fn => fn());
      unsubscribeFns = [];
    }
  });

  // Event Listeners
  googleBtn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  signoutBtn.onclick = () => auth.signOut();
  
  investBtn.onclick = () => {
    if (selectedTier) openPaymentModal(selectedTier);
  };
  
  confirmPayBtn.onclick = async () => {
    modal.classList.add('hidden');
    if (selectedTier) {
      await processInvestment(selectedTier);
      selectedTier = null;
      investBtn.disabled = true;
      investBtn.textContent = 'Select an amount';
      document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('selected'));
    }
  };
  
  cancelModalBtn.onclick = () => modal.classList.add('hidden');
  
  modal.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };
  
  renderTiers();
</script>
</body>
</html>
